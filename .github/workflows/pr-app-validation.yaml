name: PR app validation
on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-openapi:
    name: Lint Open Api specification
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          run_install: true
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ./package.json
      - name: Run OpenAPI lint
        run: bash -O extglob -c "pnpm --filter pagopa-interop-api-clients lint:openapi"

  knip:
    name: Knip codebase audit
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4
        with:
          run_install: true
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ./package.json
      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: build-output
          path: .
      - name: Run knip
        run: pnpm knip

  packages_sharding:
    name: Packages sharding
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      test_matrix: ${{ steps.sharded_packages.outputs.test_matrix }}
      lint_matrix: ${{ steps.sharded_packages.outputs.lint_matrix }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Find and categorize test packages
        id: get_test_packages
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const packagesRoot = path.join(process.cwd(), 'packages');
          const testPattern = /^\s*(it|test|it\.each|test\.each)\(/gm;

          const readJson = (filePath) => JSON.parse(fs.readFileSync(filePath, 'utf8'));

          const writeOutput = (name, value) => {
            fs.appendFileSync(
              process.env.GITHUB_OUTPUT,
              `${name}=${JSON.stringify(value)}\n`
            );
          };

          const collectDirectories = (directoryPath) =>
            fs
              .readdirSync(directoryPath, { withFileTypes: true })
              .filter((entry) => entry.isDirectory())
              .map((entry) => path.join(directoryPath, entry.name));

          // Recursively expand nested test folders before filtering test files.
          const collectFilesRecursively = (directoryPath) => {
            const files = [];

            for (const entry of fs.readdirSync(directoryPath, { withFileTypes: true })) {
              const entryPath = path.join(directoryPath, entry.name);

              if (entry.isDirectory()) {
                files.push(...collectFilesRecursively(entryPath));
              } else {
                files.push(entryPath);
              }
            }

            return files;
          };

          // Use the number of test declarations as a rough package weight.
          const countTestCases = (testDirectoryPath) =>
            collectFilesRecursively(testDirectoryPath)
              .filter((filePath) => filePath.endsWith('.test.ts'))
              .reduce((total, filePath) => {
                const source = fs.readFileSync(filePath, 'utf8');
                return total + (source.match(testPattern)?.length ?? 0);
              }, 0);

          // Build the source dataset for sharding: package name, weight, and custom shard commands.
          const collectTestPackages = () =>
            collectDirectories(packagesRoot)
              .filter((packageDir) => fs.existsSync(path.join(packageDir, 'test')))
              .map((packageDir) => {
                const packageJson = readJson(path.join(packageDir, 'package.json'));
                const shardCommands = Object.keys(packageJson.scripts ?? {})
                  .filter((scriptName) => scriptName.startsWith('test:shard'))
                  .sort();

                return {
                  name: packageJson.name,
                  weight: countTestCases(path.join(packageDir, 'test')),
                  shardCommands,
                };
              })
              .sort((left, right) => left.name.localeCompare(right.name));

          // Packages with explicit test:shard* scripts bypass weighted balancing.
          const allTestPackages = collectTestPackages();
          const dedicatedShards = allTestPackages
            .filter((pkg) => pkg.shardCommands.length > 0)
            .map((pkg) => ({
              package: pkg.name,
              commands: pkg.shardCommands,
            }));
          const remainingPackages = allTestPackages.filter(
            (pkg) => pkg.shardCommands.length === 0
          );

          console.log(`Dedicated packages: ${dedicatedShards.length}`);
          console.log(`Remaining packages for bin-packing: ${remainingPackages.length}`);

          // Intermediate output for the next step. Shape: [{ package, commands[] }]
          writeOutput('dedicated_shards', dedicatedShards);
          // Intermediate output for the next step. Shape: [{ name, weight, shardCommands[] }]
          writeOutput('remaining_packages', remainingPackages);
          NODE

      - name: Create shards matrices
        id: sharded_packages
        env:
          REMAINING_PACKAGES: '${{ steps.get_test_packages.outputs.remaining_packages }}'
          DEDICATED_SHARDS: '${{ steps.get_test_packages.outputs.dedicated_shards }}'
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const testShardCount = 20;
          const lintShardCount = 5;
          const packagesRoot = path.join(process.cwd(), 'packages');

          const readJson = (filePath) => JSON.parse(fs.readFileSync(filePath, 'utf8'));
          const parseJsonEnv = (name) => JSON.parse(process.env[name] || '[]');

          const writeOutput = (name, value) => {
            fs.appendFileSync(
              process.env.GITHUB_OUTPUT,
              `${name}=${JSON.stringify(value)}\n`
            );
          };

          const logMatrix = (label, groupLabel, matrix) => {
            console.log(`${label} Length: ${matrix.length}`);
            console.log(`::group::${groupLabel}`);
            console.log(JSON.stringify(matrix, null, 2));
            console.log('::endgroup::');
          };

          const collectDirectories = (directoryPath) =>
            fs
              .readdirSync(directoryPath, { withFileTypes: true })
              .filter((entry) => entry.isDirectory())
              .map((entry) => path.join(directoryPath, entry.name));

          // Distribute package names round-robin across a fixed number of lint shards.
          const buildLintMatrix = (packages, shardCount) => {
            const effectiveShardCount = Math.min(shardCount, packages.length);

            return Array.from({ length: effectiveShardCount }, (_, index) => ({
              shardIndex: index + 1,
              packages: packages.filter(
                (_, packageIndex) => packageIndex % effectiveShardCount === index
              ),
            })).filter((shard) => shard.packages.length > 0);
          };

          // Expand one package with many explicit shard commands into one matrix entry per command.
          const buildDedicatedTestMatrix = (packages, startIndex) =>
            packages
              .flatMap((pkg) =>
                pkg.commands.map((command) => ({
                  package: pkg.package,
                  command,
                }))
              )
              .map((entry, index) => ({
                shardIndex: startIndex + index,
                packages: [entry.package],
                command: entry.command,
              }));

          // Greedy least-loaded assignment: heavier packages are placed first.
          const buildWeightedTestMatrix = (packages, shardCount) => {
            const sortedPackages = [...packages].sort(
              (left, right) =>
                right.weight - left.weight || left.name.localeCompare(right.name)
            );
            const effectiveShardCount = Math.min(shardCount, sortedPackages.length);
            const shards = Array.from({ length: effectiveShardCount }, (_, index) => ({
              shardIndex: index + 1,
              weight: 0,
              packages: [],
              command: 'test',
            }));

            for (const pkg of sortedPackages) {
              let lightestShard = shards[0];

              for (const shard of shards.slice(1)) {
                if (shard.weight < lightestShard.weight) {
                  lightestShard = shard;
                }
              }

              lightestShard.weight += pkg.weight;
              lightestShard.packages.push(pkg.name);
            }

            return shards
              .filter((shard) => shard.packages.length > 0)
              .map(({ weight: _weight, ...shard }) => shard);
          };

          // Lint sharding considers every package, not only packages with tests.
          const collectAllPackageNames = () =>
            collectDirectories(packagesRoot)
              .map((packageDir) => path.join(packageDir, 'package.json'))
              .filter((packageJsonPath) => fs.existsSync(packageJsonPath))
              .map((packageJsonPath) => readJson(packageJsonPath).name)
              .sort((left, right) => left.localeCompare(right));

          // Main flow: read step inputs, build both matrices, log them, then expose job outputs.
          const remainingPackages = parseJsonEnv('REMAINING_PACKAGES');
          const dedicatedPackages = parseJsonEnv('DEDICATED_SHARDS');

          const testMatrix = [
            ...buildWeightedTestMatrix(remainingPackages, testShardCount),
            ...buildDedicatedTestMatrix(dedicatedPackages, testShardCount + 1),
          ];
          const lintMatrix = buildLintMatrix(collectAllPackageNames(), lintShardCount);

          logMatrix('Test Matrix', 'Shards created for testing', testMatrix);
          logMatrix('Lint Matrix', 'Shards created for linting', lintMatrix);
          // Output shape for the test strategy: [{ shardIndex, packages[], command }]
          writeOutput('test_matrix', testMatrix);
          // Output shape for the lint strategy: [{ shardIndex, packages[] }]
          writeOutput('lint_matrix', lintMatrix);
          NODE

  build:
    name: Full project build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Cache turbo setup
        uses: actions/cache@b7e8d49f17405cc70c1c120101943203c98d3a4b
        with:
          path: |
            .turbo
            packages/*/.turbo
          key: ${{ runner.os }}-turbo-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-build-
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ./package.json
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          run_install: true
      - name: Build all packages
        run: pnpm build
      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: build-output
          path: |
            .turbo/
            packages/*/dist/
            packages/*/src/generated/
            packages/*/src/gen/

  check:
    name: Check
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Cache turbo setup
        uses: actions/cache@b7e8d49f17405cc70c1c120101943203c98d3a4b
        with:
          path: |
            .turbo
            packages/*/.turbo
          key: ${{ runner.os }}-turbo-type-check-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-type-check-
            ${{ runner.os }}-turbo-build-
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ./package.json
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4
        with:
          run_install: true
      - run: pnpm check

  lint:
    name: Lint sharded [ ${{ matrix.shard.shardIndex }} ]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [packages_sharding, build]
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(needs.packages_sharding.outputs.lint_matrix) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ./package.json
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          run_install: true
      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: build-output
          path: .
      - name: Run lint for shard
        run: |
          PACKAGES_JSON='${{ toJson(matrix.shard.packages) }}'
          echo "$PACKAGES_JSON" | jq -r '.[]' | while read -r PACKAGE; do
            echo "Running lint for package: $PACKAGE"
            pnpm --filter "$PACKAGE" lint
          done

  test:
    name: Tests sharded [ ${{ matrix.shard.shardIndex }} ]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [packages_sharding, build]
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(needs.packages_sharding.outputs.test_matrix) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ./package.json
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          run_install: true
      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: build-output
          path: .
      - name: Run tests for shard
        run: |
          PACKAGES_JSON='${{ toJson(matrix.shard.packages) }}'
          COMMAND='${{ matrix.shard.command }}'

          echo "$PACKAGES_JSON" | jq -r '.[]' | while read -r PACKAGE; do
            echo "Running $COMMAND for package: $PACKAGE"
            pnpm --filter "$PACKAGE" "$COMMAND"
          done

  lint_result:
    name: Lint Result
    needs: [lint]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Check lint result
        run: |
          [[ ${{ needs.lint.result }} != 'success' ]] && exit 1
          exit 0

  test_result:
    name: Test Result
    needs: [test]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Check tests result
        run: |
          [[ ${{ needs.test.result }} != 'success' ]] && exit 1
          exit 0
