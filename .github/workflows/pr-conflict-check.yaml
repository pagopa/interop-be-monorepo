name: PR conflict check

on:
  push:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  conflict-check:
    name: Check for merge conflicts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pulls = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            for (const pr of pulls.data) {
              const { data: detail } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: pr.number,
              });

              if (detail.mergeable_state === 'dirty') {
                const marker = '<!-- conflict-bot -->';
                const { data: comments } = await github.rest.issues.listComments({
                  owner,
                  repo,
                  issue_number: pr.number,
                });
                const existing = comments.find(c => c.body.includes(marker));
                if (!existing) {
                  await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: pr.number,
                    body: `${marker}\n⚠️ @${pr.user.login} This PR now has merge conflicts with \`${detail.base.ref}\`. Please rebase or merge the target branch to resolve them.`,
                  });
                }
              }
            }
