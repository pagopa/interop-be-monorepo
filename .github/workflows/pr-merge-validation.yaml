name: PR merge validation
on:
  pull_request:
    branches:
      - "develop"
      - "release-*"
      - "release/*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  ALLOWED_RELEASE: "release-2.16.0"

jobs:
  validate-develop:
    name: Validate PR towards develop
    if: github.event.pull_request.base.ref == 'develop'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check if branch is an align branch
        id: check_align
        env:
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
        run: |
          if echo "$BRANCH_NAME" | grep -qi "align"; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Branch '$BRANCH_NAME' contains 'align'. Skipping release check."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Check release version in PR description
        if: steps.check_align.outputs.skip != 'true' && github.actor != 'renovate-pagopa'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Checking PR description for release tag..."
          echo "Allowed release: $ALLOWED_RELEASE"

          MATCHED_RELEASE=$(echo "$PR_BODY" | grep -oP 'release[-/]\d+\.\d+\.\d+(?!\d)' | head -n 1 | sed 's|release/|release-|' || true)

          if [ -z "$MATCHED_RELEASE" ]; then
            echo "::error::PR description does not contain a release tag (expected format: release-x.y.z)"
            exit 1
          fi

          echo "Found release tag: $MATCHED_RELEASE"

          if [ "$MATCHED_RELEASE" != "$ALLOWED_RELEASE" ]; then
            echo "::error::Release tag '$MATCHED_RELEASE' does not match the allowed release '$ALLOWED_RELEASE'"

            # Extract the version number from the matched release tag
            VERSION=$(echo "$MATCHED_RELEASE" | sed 's/release-//')

            # Look for an existing release branch matching release-x.y.z or release/x.y.z
            RELEASE_BRANCH=$(gh api "repos/${{ github.repository }}/branches" --paginate --jq ".[].name" | grep -E "^release[-/]${VERSION}$" | head -n 1 || true)

            if [ -n "$RELEASE_BRANCH" ]; then
              echo "::warning::A release branch '$RELEASE_BRANCH' exists for version $VERSION. Consider targeting that branch instead of develop."
              echo ""
              echo "Suggestion: retarget this PR to branch '$RELEASE_BRANCH'"
            fi

            exit 1
          fi

          echo "Release tag matches. PR is allowed to merge."

  validate-release:
    name: Validate PR towards release branch
    if: github.event.pull_request.base.ref != 'develop'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check if branch is an align branch
        id: check_align
        env:
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
        run: |
          if echo "$BRANCH_NAME" | grep -qi "align"; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Branch '$BRANCH_NAME' contains 'align'. Skipping release check."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Check release version in PR description
        if: steps.check_align.outputs.skip != 'true'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          # Normalize target branch name to release-x.y.z format
          EXPECTED_RELEASE=$(echo "$BASE_REF" | sed 's|release/|release-|')
          echo "Target release branch: $BASE_REF"
          echo "Expected release tag in PR description: $EXPECTED_RELEASE"

          MATCHED_RELEASE=$(echo "$PR_BODY" | grep -oP 'release[-/]\d+\.\d+\.\d+(?!\d)' | head -n 1 | sed 's|release/|release-|' || true)

          if [ -z "$MATCHED_RELEASE" ]; then
            echo "::error::PR description does not contain a release tag (expected format: release-x.y.z)"
            exit 1
          fi

          echo "Found release tag: $MATCHED_RELEASE"

          if [ "$MATCHED_RELEASE" != "$EXPECTED_RELEASE" ]; then
            echo "::error::Release tag '$MATCHED_RELEASE' does not match the target release branch '$EXPECTED_RELEASE'"
            exit 1
          fi

          echo "Release tag matches the target branch. PR is allowed to merge."
