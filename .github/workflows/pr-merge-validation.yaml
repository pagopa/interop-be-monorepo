name: PR merge validation
on:
  pull_request:
    branches:
      - "develop"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  ALLOWED_RELEASE_DEVELOP: "2.21.0"

jobs:
  validate-develop:
    name: Validate PR towards develop
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check if PR is an align PR
        id: check_align
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if echo "$PR_TITLE" | grep -qP '^align/\d+\.\d+\.\d+$'; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "PR title '$PR_TITLE' is an align PR. Skipping release check."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Check release label on PR
        if: steps.check_align.outputs.skip != 'true'
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ' ') }}
        run: |
          echo "Checking PR labels for release tag..."
          echo "Allowed release: $ALLOWED_RELEASE_DEVELOP"

          MATCHED_RELEASE=""
          for LABEL in $PR_LABELS; do
            if echo "$LABEL" | grep -qP '^\d+\.\d+\.\d+$'; then
              MATCHED_RELEASE="$LABEL"
              break
            fi
          done

          if [ -z "$MATCHED_RELEASE" ]; then
            echo "::error::PR does not have a release label (expected format: x.y.z)"
            exit 1
          fi

          echo "Found release label: $MATCHED_RELEASE"

          if [ "$MATCHED_RELEASE" != "$ALLOWED_RELEASE_DEVELOP" ]; then
            echo "::error::Release label '$MATCHED_RELEASE' does not match the allowed release '$ALLOWED_RELEASE_DEVELOP'"
            exit 1
          fi

          echo "Release label matches. PR is allowed to merge."
