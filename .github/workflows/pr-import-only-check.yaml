name: PR import-only check

on:
  pull_request:

permissions:
  contents: read

jobs:
  check-import-only-changes:
    name: Verify changes are import-only
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Check all source file changes are import-only
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          # Get the diff for source files, showing only changed lines with no context
          diff_output=$(git diff --unified=0 "$BASE_SHA"..."$HEAD_SHA" -- '*.ts' '*.tsx' '*.js' '*.jsx')

          if [ -z "$diff_output" ]; then
            echo "No source file changes found."
            exit 0
          fi

          # Extract added/removed content lines (skip diff headers),
          # strip the leading +/-, then filter out allowed lines:
          #   - blank lines
          #   - import statements:           import { Foo } from "bar";
          #   - single identifiers:          Foo,
          #   - closing brace:               } from "bar";
          #   - line comments:               // ...
          #   - block comment delimiters:    /* ...  or  * ...  or  */
          #   - aliased imports:             Foo as Bar,
          #   - indented text (comment body): NOTE: some text
          bad_lines=$(echo "$diff_output" \
            | grep '^[+-]' \
            | grep -v '^[+-][+-][+-] ' \
            | sed 's/^[+-]//' \
            | grep -v '^[[:space:]]*$' \
            | grep -v '^import ' \
            | grep -v '^[[:space:]]*[A-Za-z_$][A-Za-z0-9_$]*,\?[[:space:]]*$' \
            | grep -v '^[[:space:]]*}' \
            | grep -v '^[[:space:]]*//' \
            | grep -v '^[[:space:]]*/\*' \
            | grep -v '^[[:space:]]*\*' \
            | grep -v '^[[:space:]]*[A-Za-z_$][A-Za-z0-9_$]*[[:space:]]\+as[[:space:]]\+[A-Za-z_$][A-Za-z0-9_$]*,\?[[:space:]]*$' \
            | grep -v '^[[:space:]]\+[A-Za-z].*$' \
            || true)

          if [ -z "$bad_lines" ]; then
            echo "✅ All changed lines are import statements or blank lines."
            exit 0
          fi

          echo "❌ Found non-import, non-blank changed lines:"
          echo "$bad_lines"
          echo ""
          echo "This PR should only contain import reordering and blank line changes."
          exit 1
