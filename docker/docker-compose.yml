# Docker Compose for local development environment

name: pagopa-interop
volumes:
  ses-mock-npm-global:
  ses-mock-npm-cache:
  event-store-data:
  readmodel-sql-data:
  in-app-notification-manager-sql-data:
  domains-analytics-sql-data:
  m2m-event-sql-data:
  digest-tracking-sql-data:
  tenant-kind-history-sql-data:
  scheduled-notification-sql-data:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:
  kafka-logs:
  connect-data:
  connect-logs:
  pg-admin-data:
  elasticmq-data:
  mailpit-data:
  local-kms-data:
  redis-data:
  dynamodb-data:
  minio-data:

services:
  # Event Store Postgres DB
  event-store:
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/run/postgresql
      - /tmp
    volumes:
      - ./event-store-init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - event-store-data:/var/lib/postgresql/data
    image: postgres:14
    ports:
      - 6001:5432
    environment:
      POSTGRES_DB: root
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    command: -c 'max_connections=512' -c 'wal_level=logical'

  # POSTGRESQL readmodel
  readmodel-sql:
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/run/postgresql
      - /tmp
    volumes:
      - ./readmodel-db:/docker-entrypoint-initdb.d
      - readmodel-sql-data:/var/lib/postgresql/data
    image: postgres:14
    ports:
      - 6002:5433
    environment:
      PGPORT: 5433
      POSTGRES_DB: root
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    command: -c 'max_connections=512' -c 'wal_level=logical'

  # POSTGRESQL in-app notification manager
  in-app-notification-manager-sql:
    read_only: true
    tmpfs:
      - /var/run/postgresql
      - /tmp
    volumes:
      - ./in-app-notification-db:/docker-entrypoint-initdb.d
      - in-app-notification-manager-sql-data:/var/lib/postgresql/data
    image: postgres:14
    ports:
      - 6004:5433
    environment:
      PGPORT: 5433
      POSTGRES_DB: root
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root

  # analytics POSTGRESQL-15
  domains-analytics-sql:
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/run/postgresql
      - /tmp
    volumes:
      - ./domains-analytics-db:/docker-entrypoint-initdb.d
      - domains-analytics-sql-data:/var/lib/postgresql/data
    image: postgres:15
    ports:
      - 6003:5434
    environment:
      PGPORT: 5434
      POSTGRES_DB: root
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    command: -c 'max_connections=512' -c 'wal_level=logical'

  # M2M events POSTGRESQL DB
  m2m-event-sql:
    read_only: true
    tmpfs:
      - /var/run/postgresql
      - /tmp
    volumes:
      - ./m2m-event-db:/docker-entrypoint-initdb.d
      - m2m-event-sql-data:/var/lib/postgresql/data
    image: postgres:14
    ports:
      - 6006:5433
    environment:
      PGPORT: 5433
      POSTGRES_DB: root
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root

  # POSTGRESQL digest tracking (email-notification-digest)
  digest-tracking-sql:
    read_only: true
    tmpfs:
      - /var/run/postgresql
      - /tmp
    volumes:
      - ./digest-tracking-db:/docker-entrypoint-initdb.d
      - digest-tracking-sql-data:/var/lib/postgresql/data
    image: postgres:14
    ports:
      - 6007:5433
    environment:
      PGPORT: 5433
      POSTGRES_DB: root
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root

  # POSTGRESQL tenant kind history
  tenant-kind-history-sql:
    read_only: true
    tmpfs:
      - /var/run/postgresql
      - /tmp
    volumes:
      - ./tenant-kind-history-db:/docker-entrypoint-initdb.d
      - tenant-kind-history-sql-data:/var/lib/postgresql/data
    image: postgres:14
    ports:
      - 6008:5433
    environment:
      PGPORT: 5433
      POSTGRES_DB: root
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root

  # POSTGRESQL scheduled notification (scheduled-notification-scheduler + dispatchers)
  scheduled-notification-sql:
    read_only: true
    tmpfs:
      - /var/run/postgresql
      - /tmp
    volumes:
      - ./scheduled-notification-db:/docker-entrypoint-initdb.d
      - scheduled-notification-sql-data:/var/lib/postgresql/data
    image: postgres:14
    ports:
      - 6009:5433
    environment:
      PGPORT: 5433
      POSTGRES_DB: root
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root

  # Zookeeper for Kafka
  zookeeper:
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /zookeeper/conf
      - /tmp
    volumes:
      - zookeeper-data:/zookeeper/data
      - zookeeper-logs:/zookeeper/txns
    image: quay.io/debezium/zookeeper:2.3
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/2181"]
      interval: 2s
      timeout: 2s
      retries: 30

  # Kafka server
  kafka:
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /kafka/config
      - /tmp
    volumes:
      - kafka-data:/kafka/data
      - kafka-logs:/kafka/logs
    image: quay.io/debezium/kafka:2.3
    ports:
      - 9092:9092
      - 29092:29092
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: LISTENER_DOCKER://kafka:29092,LISTENER_HOST://kafka:9092
      KAFKA_ADVERTISED_LISTENERS: LISTENER_DOCKER://kafka:29092,LISTENER_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: LISTENER_DOCKER:PLAINTEXT,LISTENER_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: LISTENER_DOCKER
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "/kafka/bin/kafka-topics.sh", "--bootstrap-server", "kafka:29092", "--list"]
      interval: 3s
      timeout: 3s
      retries: 40

  # Debezium to stream event store changes to kafka
  connect:
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /kafka/config
      - /tmp
    volumes:
      - connect-data:/kafka/data
      - connect-logs:/kafka/logs
    image: quay.io/debezium/connect:2.3
    ports:
      - 8083:8083
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      CONNECT__BINARY_HANDLING_MODE: hex
    depends_on:
      kafka:
        condition: service_healthy

  # Dynamo DB readmodel for token generation and privacy notices
  dynamodb-local:
    user: "0:0"
    command: "-jar DynamoDBLocal.jar -dbPath /data -sharedDb"
    image: amazon/dynamodb-local:2.6.1
    ports:
      - 8085:8000
    volumes:
      - dynamodb-data:/data
    working_dir: /home/dynamodblocal

  # Web GUI for dynamodb
  dynamodb-admin:
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    image: aaronshaf/dynamodb-admin:4.6.1
    depends_on:
      - dynamodb-local
    restart: always
    ports:
      - "8002:8001"
    environment:
      - DYNAMO_ENDPOINT=http://dynamodb-local:8000
      - AWS_REGION=eu-south-1

  # dynamodb migrations and data seed
  dynamodb-migrations:
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /root/.aws
    image: amazon/aws-cli:2.17.44
    working_dir: /home/dynamodblocal
    volumes:
      - ./dynamo-db:/home/dynamodblocal
    depends_on:
      - dynamodb-local
    environment:
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      - AWS_REGION=eu-south-1
      - TABLES=privacy-notice,privacy-notice-acceptances,platform-states,token-generation-states,interactions,dpop-cache,producer-keychain-platform-states
    entrypoint: ./dynamo-migrations.sh

  # Web GUI for PostgreSQL
  pg-admin:
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/log/pgadmin
    image: dpage/pgadmin4:2024-04-01-1
    ports:
      - 8082:80
    environment:
      PGADMIN_DEFAULT_EMAIL: root@example.com
      PGADMIN_DEFAULT_PASSWORD: example
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    restart: always
    volumes:
      - ./pg-servers.json:/pgadmin4/servers.json
      - ./pg-pass:/pgadmin4/pgpass
      - pg-admin-data:/var/lib/pgadmin
    # see https://stackoverflow.com/a/69475874/846273
    entrypoint: >
      /bin/sh -c "
      mkdir -m 700 /var/lib/pgadmin/storage/root_example.com;
      chown -R pgadmin:pgadmin /var/lib/pgadmin/storage/root_example.com;
      cp -prv /pgadmin4/pgpass /var/lib/pgadmin/storage/root_example.com/;
      chmod 600 /var/lib/pgadmin/storage/root_example.com/pgpass;
      /entrypoint.sh
      "

  # Web GUI for kafka
  kafka-ui:
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    container_name: kafka-ui
    image: provectuslabs/kafka-ui:53a6553765a806eda9905c43bfcfe09da6812035
    ports:
      - 8084:8080
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # MinIO is a local S3-compatible storage, to replace AWS S3 in local development
  minio:
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /root/.minio
    image: minio/minio:RELEASE.2024-02-06T21-36-22Z
    entrypoint: >
      /usr/bin/minio server /data --console-address ':9001'
    ports:
      - 9000:9000
      - 9001:9001
    environment:
      MINIO_ROOT_USER: testawskey # use this as AWS S3 access key ID
      MINIO_ROOT_PASSWORD: testawssecret # use this as AWS S3 secret access key
      MINIO_SITE_REGION: eu-south-1
    volumes:
      - minio-data:/data
    restart: always

  # Seed data for MinIO
  minio-seed:
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /root/.mc
    image: minio/mc:RELEASE.2024-02-09T22-18-24Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        mc alias set minio http://minio:9000 testawskey testawssecret;
        mc ready minio;
        echo 'MinIO is ready. Seeding data...';
        mc mb minio/interop-local-bucket || true;
        mc mb minio/interop-datalake-bucket || true;
        mc mb minio/interop-application-import-export-local || true;
        mc mb minio/interop-data-lake-interfaces-exports-local-es1 || true;
        mc mb --with-lock minio/interop-generated-jwt-audit || true;
        mc cp --recursive data/ minio/;
      "
    volumes:
      - ./minio-seed:/data

  # ElasticMQ is a local SQS-compatible queue system, to replace AWS SQS in local development
  elasticmq:
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    image: softwaremill/elasticmq-native:1.5.7
    ports:
      - 9324:9324
      - 9325:9325
    volumes:
      - ./elasticmq.local.conf:/opt/elasticmq.conf
      - elasticmq-data:/data
    restart: always

  # Mailpit is a local SMTP server, to replace AWS SES in local development
  mailpit:
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - mailpit-data:/data
    image: axllent/mailpit:v1.19
    ports:
      - 8025:8025
      - 1025:1025

  # local-kms is a local KMS-compatible key management service, to replace AWS KMS in local development
  local-kms:
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    image: nsmithuk/local-kms:3.11.7
    ports:
      - 4566:4566
    environment:
      PORT: 4566
      KMS_REGION: eu-south-1
    volumes:
      - ./local-kms-seed/seed.yaml:/init/seed.yaml
      - local-kms-data:/data

  # HTTP server to simulate well-known JWKS endpoint
  jwks:
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    image: nginx:1.27.0
    ports:
      - 4500:80
    volumes:
      - ./local-kms-seed/jwks.json:/usr/share/nginx/html/jwks.json

  # Mock for AWS SES
  ses-mock:
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ses-mock-npm-global:/root/.npm-global
      - ses-mock-npm-cache:/root/.npm
    image: node:20
    ports:
      - 8005:8005
    command: "/bin/bash -c 'export PATH=/root/.npm-global/bin:$$PATH && npm install -g --prefix /root/.npm-global aws-ses-v2-local && aws-ses-v2-local --port=8005 --host=0.0.0.0'"

  # Redis local cache database used by the RateLimiter and NotificationEmailSender
  redis:
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - redis-data:/data
    image: "redis:7.2.5-alpine3.20"
    ports:
      - "6379:6379"

  # Minimal implementation of the Selfcare APIs consumed by the BFF.
  selfcare-mock:
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    image: node:20-alpine
    command: node /app/selfcare-mock.mjs
    environment:
      PORT: 8006
      SELFCARE_MOCK_DATASET: /app/dataset.json
    ports:
      - "8006:8006"
    volumes:
      - ./selfcare-mock/selfcare-mock.mjs:/app/selfcare-mock.mjs:ro
      - ./local-development/dataset.json:/app/dataset.json:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8006/health"]
      interval: 2s
      timeout: 2s
      retries: 30
